name: Production Compile, Container Release & Pages Deploy

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

concurrency:
  group: "global-release-pipeline"
  cancel-in-progress: true

jobs:
  build-and-compile:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version_tag.outputs.TAG_ID }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Instantiate Bun Workspace Engine
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Execute Node Dependency Resolution
        run: |
          cd src/js
          bun install

      - name: Build Un-Hashed Production Distribution Assets
        run: |
          cd src/js
          bun run build

      - name: Generate Unique Build Timestamp & Inject Cache Buster
        id: version_tag
        run: |
          TIMESTAMP=$(date +'%Y%m%d%H%M%S')
          GENERATED_TAG="v1.0.${TIMESTAMP}"
          echo "TAG_ID=${GENERATED_TAG}" >> "$GITHUB_OUTPUT"
          
          # Inject cache buster strings directly into the newly compiled output HTML file
          sed -i "s/main.js\"/main.js?v=${TIMESTAMP}\"/g" src/js/dist/index.html

      - name: Cross-Compile Standalone Singular Binary Executables
        run: |
          mkdir dist-bin
          cd src/js
          bun run build:executables

      - name: Stage Pre-Built Distribution Archives
        run: |
          mkdir release-artifacts
          cp dist-bin/* release-artifacts/
          
          cd src/js
          zip -r "../../release-artifacts/d2-playground-web-assets.zip" dist/* ../../public/onig.wasm
          cp ../../docker-compose.yml ../../release-artifacts/

      - name: Set up Docker Buildx Builder Engine
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile and Push Container Image to Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false # FIXED: Prevents unknown/unknown cache manifests in GHCR
          tags: |
            ghcr.io/${{ github.repository_owner }}/d2-playground:latest
            ghcr.io/${{ github.repository_owner }}/d2-playground:${{ steps.version_tag.outputs.TAG_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish Compilation Packages to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_tag.outputs.TAG_ID }}
          name: "D2 Playground System Release Suite (${{ steps.version_tag.outputs.TAG_ID }})"
          body: |
            ### Standalone Single-File System Executables
            Download the binary matching your core platform directly. It operates completely independently as a single artifact with no external asset folder dependencies.
            
            ### Container Composition Blueprint
            The production container image is securely deployed onto GHCR. Spin up your local infrastructure using your layout's `docker-compose.yml` asset via:
            ```bash
            docker compose up -d
            ```
            
            ### Pre-Compiled Web Hosting Assets (No Rebuild Needed)
            Unpack `d2-playground-web-assets.zip` and move the static folders directly into the public root path index of Apache, Nginx, IIS, or Caddy to host your own sandbox instance instantly.
          draft: false
          prerelease: false
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Distribution Bundle to Pages Engine Pipeline
        uses: actions/upload-pages-artifact@v3
        with:
          path: './src/js/dist'

  publish-live-pages:
    needs: build-and-compile
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Live Sandbox to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
