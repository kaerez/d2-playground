name: Production Compile, Container Release & Pages Deploy

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

concurrency:
  group: "global-release-pipeline"
  cancel-in-progress: true

jobs:
  build-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Instantiate Bun Workspace Engine
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Execute Node Dependency Resolution
        run: |
          cd src/js
          bun install

      - name: Build Un-Hashed Production Distribution Assets
        run: |
          cd src/js
          bun run build

      - name: Generate Unique Build Timestamp & Inject Cache Buster
        run: |
          TIMESTAMP=$(date +'%Y%m%d%H%M%S')
          TAG_ID="v1.0.${TIMESTAMP}"
          echo "RELEASE_TAG=${TAG_ID}" >> $GITHUB_ENV
          
          # Inject cache buster strings directly into the compiled output HTML file
          sed -i "s/main.js\"/main.js?v=${TIMESTAMP}\"/g" src/js/dist/index.html

      - name: Cross-Compile Standalone Binary Executables
        run: |
          mkdir dist-bin
          cd src/js
          bun run build:executables

      - name: Stage Pre-Built Distribution Archives
        run: |
          mkdir release-artifacts
          
          # 1. Bundle local cross-compiled executables together with their static companion folders
          cd dist-bin
          for binary in *; do
            mkdir -p "temp_pkg/src/js" "temp_pkg/public"
            cp "$binary" "temp_pkg/"
            cp -r "../src/js/dist" "temp_pkg/src/js/dist"
            cp -r "../../public" "temp_pkg/public"
            cp "../../server.ts" "temp_pkg/"
            
            zip -r "../../release-artifacts/${binary}-standalone-bundle.zip" temp_pkg/*
            rm -rf temp_pkg
          done
          cd ..
          
          # 2. Package raw un-hashed folders for instant web server hosting configurations
          cd src/js
          zip -r "../../release-artifacts/d2-playground-web-assets.zip" dist/* ../../public/*
          cp ../../docker-compose.yml ../../release-artifacts/

      - name: Set up Docker Buildx Builder Engine
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile and Push Container Image to Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/d2-playground:latest
            ghcr.io/${{ github.repository_owner }}/d2-playground:${{ env.RELEASE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish Compilation Packages to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "D2 Playground System Release Suite (${{ env.RELEASE_TAG }})"
          body: |
            ### Standalone Local Server Bundles
            Download the zip matching your core platform. Extract the folder completely, and execute the binary file to launch the sandbox environment with all media assets securely served locally.
            
            ### Container Composition Blueprint
            The production container image is securely deployed onto GHCR. Spin up your local infrastructure using your layout's `docker-compose.yml` asset via:
            ```bash
            docker compose up -d
            ```
            
            ### Pre-Compiled Web Hosting Assets (No Rebuild Needed)
            Unpack `d2-playground-web-assets.zip` and move the static folders directly into the public root path index of Apache, Nginx, IIS, or Caddy to host your own sandbox instance instantly.
          draft: false
          prerelease: false
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Distribution Bundle to Pages Engine Pipeline
        uses: actions/upload-pages-artifact@v3
        with:
          path: './src/js/dist'

  publish-live-pages:
    needs: build-and-compile
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Live Sandbox to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
