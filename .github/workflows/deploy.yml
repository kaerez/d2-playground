name: Automated Build, Docker Release & Pages Deployment

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

concurrency:
  group: "global-deployment-pipeline"
  cancel-in-progress: true

jobs:
  build-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Bun Workspace Environment
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Run Core Module Installation
        run: |
          cd src/js
          bun install

      - name: Build Web Application via Vite
        run: |
          cd src/js
          bun run build

      - name: Cross-Compile Standalone Platform Binaries
        run: |
          mkdir dist-bin
          cd src/js
          bun run build:executables

      - name: Package Pre-Built Web Deployment Assets
        run: |
          mkdir release-artifacts
          # 1. Stage the raw single file compiled system executables
          cp dist-bin/* release-artifacts/
          
          # 2. Package raw distribution folders for standard web server configuration environments
          cd src/js
          zip -r "../../release-artifacts/d2-playground-web-assets.zip" dist/* ../../public/onig.wasm
          
          # 3. Include Docker Compose configurations inside release payloads
          cp ../../docker-compose.yml ../../release-artifacts/

      - name: Generate Chronological SemVer Tag Version
        id: version_tag
        run: |
          TAG_ID="v1.0.$(date +'%Y%m%d%H%M%S')"
          echo "RELEASE_TAG=${TAG_ID}" >> $GITHUB_ENV

      - name: Set up Docker Buildx Runner
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Production Container Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/d2-playground:latest
            ghcr.io/${{ github.repository_owner }}/d2-playground:${{ env.RELEASE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push All Compiled Artifacts to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "D2 Playground System Package Release Hub (${{ env.RELEASE_TAG }})"
          body: |
            ### Standalone Single-File System Executables
            Download the binary matching your system architecture framework directly. No runtime directory wrappers or environment hooks required.
            
            ### Docker Deployment Configuration
            The production instance container is compiled and stored on the GitHub Container Registry. Spin up the environment by copying `docker-compose.yml` into your environment and executing:
            ```bash
            docker compose up -d
            ```
            
            ### Pre-Built Plain Web Hosting Assets
            Deploy the playground straight to Apache, Nginx, or IIS without installing a local compilation pipeline by dropping the unpacked contents of `d2-playground-web-assets.zip` straight into your server instance layout root index.
          draft: false
          prerelease: false
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Core Assets to GitHub Pages Pipeline
        uses: actions/upload-pages-artifact@v3
        with:
          path: './src/js/dist'

  publish-live-pages:
    needs: build-and-compile
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Live Sandbox to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
